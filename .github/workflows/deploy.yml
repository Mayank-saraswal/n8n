name: Build and Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: nodebaseacr.azurecr.io
  IMAGE_NAME: nodebase
  RESOURCE_GROUP: nodebase-prod-rg
  CONTAINER_APP: nodebase-app
  CONTAINER_APP_ENV: nodebase-env

jobs:
  build-and-push:
    name: Build Docker image and push to ACR
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: nodebaseacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: nodebaseacr.azurecr.io/nodebase
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=nodebaseacr.azurecr.io/nodebase:latest
          cache-to: type=inline

  deploy:
    name: Deployment complete
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Done
        run: |
          echo "Image pushed to Azure Container Registry."
          echo "Image: nodebaseacr.azurecr.io/nodebase:sha-${{ github.sha }}"
          echo "Azure Container App will auto-redeploy via ACR webhook."

  build-check:
    name: Validate build (PR only)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: "postgresql://dbadmin:Mayank@2027@nodebase-db-prod.postgres.database.azure.com:6432/postgres?sslmode=require&pgbouncer=true&connection_limit=1&pool_timeout=20"
          BETTER_AUTH_SECRET: "dummy-secret-for-build"
          NEXT_PUBLIC_APP_URL: "https://nodebase-app.agreeablebeach-f1713ef7.eastasia.azurecontainerapps.io"