name: Build and Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: nodebaseacr.azurecr.io
  IMAGE_NAME: nodebase
  RESOURCE_GROUP: nodebase-prod-rg
  CONTAINER_APP: nodebase-app
  CONTAINER_APP_ENV: nodebase-env

jobs:
  build-and-push:
    name: Build Docker image and push to ACR
    runs-on: ubuntu-latest
    # Only build and push on main branch pushes (not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: nodebaseacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: nodebaseacr.azurecr.io/nodebase
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=nodebaseacr.azurecr.io/nodebase:latest
          cache-to: type=inline

  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions: {}

    steps:
      - name: Log in to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.RESOURCE_GROUP }}
          containerAppName: ${{ env.CONTAINER_APP }}
          imageToDeploy: nodebaseacr.azurecr.io/nodebase:sha-${{ github.sha }}

      - name: Get deployed URL
        run: |
          URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)
          echo "Deployed to: https://$URL"

  # Run on PRs to validate the build compiles
  build-check:
    name: Validate build (PR only)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Dummy values for build — real values injected at runtime
          DATABASE_URL: "postgresql://dummy:dummy@dummy:5432/dummy"
          BETTER_AUTH_SECRET: "dummy-secret-for-build"
          NEXT_PUBLIC_APP_URL: "https://dummy.azurecontainerapps.io"
